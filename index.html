<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sathi AI</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Noto+Sans+Sinhala:wght@400;500;700&family=Noto+Sans+Tamil:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
<style>
:root{
  --bg:#0e0f10; --bg-elev:#17181a; --bg-elev2:#1f2123; --border:#2a2d30;
  --accent1:#5b8cff; --accent2:#e9678f; --accent3:#a786ff;
  --text:#e8e9ea; --text-dim:#9a9ea3; --gold:#f2b01f;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Google Sans','Noto Sans Sinhala','Noto Sans Tamil',sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;}
.app-container{display:flex;width:100%;height:100vh;position:relative;}

aside{width:280px;background:var(--bg-elev);display:flex;flex-direction:column;padding:16px;border-right:1px solid var(--border);transition:all .3s ease;z-index:100;}
.new-chat-btn{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--accent1),var(--accent3));border:none;border-radius:24px;padding:13px 20px;color:#fff;font-weight:500;cursor:pointer;margin-bottom:20px;font-size:14px;width:fit-content;box-shadow:0 4px 14px rgba(91,140,255,.25);}
.history-section{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;}
.history-section::-webkit-scrollbar{width:4px;}
.history-section::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.sidebar-bottom{border-top:1px solid var(--border);padding-top:12px;margin-top:8px;}
.sidebar-link{display:flex;align-items:center;gap:10px;padding:12px;border-radius:14px;color:var(--text-dim);cursor:pointer;font-size:14px;}
.sidebar-link:hover{background:var(--bg-elev2);color:var(--text);}

main{flex:1;display:flex;flex-direction:column;height:100vh;background:var(--bg);position:relative;transition:all .3s ease;}
header{display:flex;align-items:center;padding:16px;border-bottom:1px solid var(--border);height:60px;}
.brand{font-size:20px;font-weight:500;display:flex;align-items:center;gap:8px;cursor:pointer;flex:1;}
.menu-btn{cursor:pointer;margin-right:15px;display:none;}

.chat-container{flex:1;overflow-y:auto;padding:20px 15%;}
.footer-container{padding:15px 15% 20px;}
.input-wrapper{max-width:850px;margin:0 auto;display:flex;align-items:center;background:var(--bg-elev);border:1px solid var(--border);border-radius:28px;padding:8px 8px 8px 18px;}
#userInput{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:16px;padding:8px;}
.send-btn{background:linear-gradient(135deg,var(--accent1),var(--accent3));border:none;color:#fff;cursor:pointer;width:40px;height:40px;border-radius:50%;}

/* Mobile responsive fixes */
@media (max-width:768px){
  aside{position:absolute;left:-280px;height:100%;}
  aside.open{left:0;}
  .menu-btn{display:block;}
  .chat-container,.footer-container{padding-left:15px;padding-right:15px;}
}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;}
.modal-overlay.active{opacity:1;pointer-events:auto;}
.modal-card{background:var(--bg-elev);padding:25px;border-radius:18px;width:90%;max-width:380px;border:1px solid var(--border);}
</style>
</head>
<body>

<div class="app-container">
  <aside id="sidebar">
    <button class="new-chat-btn" onclick="startNewChat(); toggleSidebar();"><span class="material-icons-outlined">add</span> New Chat</button>
    <div class="history-section" id="chatList"></div>
    <div class="sidebar-bottom">
      <div class="sidebar-link" onclick="openSettingsModal(); toggleSidebar();"><span class="material-icons-outlined">settings</span> Settings</div>
    </div>
  </aside>

  <main id="mainContent">
    <header>
      <span class="material-icons-outlined menu-btn" onclick="toggleSidebar()">menu</span>
      <div class="brand" onclick="handleLogoTap()">Sathi AI</div>
      <div id="authArea"></div>
    </header>
    <div class="chat-container" id="chatContainer"></div>
    <div class="footer-container">
      <div class="input-wrapper">
        <input type="text" id="userInput" placeholder="Ask Sathi AI..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="send-btn" onclick="sendMessage()"><span class="material-icons-outlined">send</span></button>
      </div>
    </div>
  </main>
</div>

<!-- Modals same as before -->
<div class="modal-overlay" id="loginModal"><div class="modal-card"><h3>Owner Login</h3><input type="text" id="usernameInput" placeholder="User"><input type="password" id="passwordInput" placeholder="Pass"><button onclick="handleLogin()">Login</button></div></div>
<div class="modal-overlay" id="settingsModal"><div class="modal-card"><h3>Settings</h3><button onclick="closeSettingsModal()">Close</button></div></div>

<script>
// Logic improvements
function toggleSidebar(){
  const sidebar = document.getElementById("sidebar");
  sidebar.classList.toggle("open");
}

// Close sidebar when clicking main content
document.getElementById('mainContent').addEventListener('click', function(e) {
  const sidebar = document.getElementById("sidebar");
  if(sidebar.classList.contains('open') && !e.target.closest('.menu-btn')) {
    sidebar.classList.remove('open');
  }
});

let logoTapCount = 0;
function handleLogoTap() {
  logoTapCount++;
  if (logoTapCount >= 3) {
    document.getElementById("loginModal").classList.add("active");
    logoTapCount = 0;
  }
  setTimeout(() => { logoTapCount = 0; }, 1000);
}

// Keep existing logic for messages and API...
function startNewChat(){ /* ... */ }
function sendMessage(){ /* ... */ }
function openSettingsModal(){ document.getElementById("settingsModal").classList.add("active"); }
function closeSettingsModal(){ document.getElementById("settingsModal").classList.remove("active"); }
function handleLogin(){ /* ... */ }
</script>
</body>
</html>
